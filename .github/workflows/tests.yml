name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL da aplicação'
        required: false
        default: ''

jobs:

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Build
        shell: bash
        run: mvn compile test-compile -B -q

  smoke:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Smoke tests
        shell: bash
        run: mvn test -Dtest="all.RunCucumberTest" -Dcucumber.filter.tags="@smoke" -B
        env:
          BASE_URL: ${{ inputs.base_url || secrets.BASE_URL }}
          APP_USER: ${{ secrets.APP_USER }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          HEADLESS: "true"
          TIMEOUT: "10"
      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-smoke
          path: target/reports/extent-report.html
          retention-days: 30

  e2e:
    needs: smoke
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: E2e tests (${{ matrix.browser }})
        shell: bash
        run: mvn test -Dtest="all.RunCucumberTest" -Dcucumber.filter.tags="@e2e and not @smoke" -Dbrowser=${{ matrix.browser }} -B
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          APP_USER: ${{ secrets.APP_USER }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          HEADLESS: "true"
          TIMEOUT: "10"
      - name: Upload e2e report (${{ matrix.browser }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-e2e-${{ matrix.browser }}
          path: target/reports/extent-report.html
          retention-days: 30

  golden-path:
    needs: e2e
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Golden Path test
        shell: bash
        run: mvn test -Dtest="all.RunCucumberTest" -Dcucumber.filter.tags="@goldenPath" -B
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          APP_USER: ${{ secrets.APP_USER }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          HEADLESS: "true"
          TIMEOUT: "10"
      - name: Upload golden path report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-golden-path
          path: target/reports/extent-report.html
          retention-days: 30